<!doctype html>
<html>
  <head>
    <title>Zonai Device Guide</title>
    <meta name="description" content="Zonai Devices" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <button onclick="displayAllDevices()" id="title-button">
        <h1 class="title">Zonai Devices</h1>
      </button>
    </header>

    <h2 class="section-title">Device Catalog</h2>
    <div class="scroll" id="card-container"></div>

    <div class="section-header">
      <h2 class="section-title">My Construct Build</h2>
      <button onclick="removeDeviceFromConstruct()" class="remove-btn">Remove Device</button>
      <button onclick="redoDevice()" class="redo-btn">Redo Device</button>
    </div>
    <div class="scroll" id="construct-container"></div>

    <div class="card" id="device-template" style="display: none">
      <div class="card-content">
        <h2>Device Name</h2> 
        <img src="" alt="Zonai Device" />
        <ul class="description">
          </ul>
      </div>
    </div>

    <div class="footer">
      <button onclick="showLogisticsReport()"> Inventory and Farming Locations</button>
      <button onclick="displaylstgrtstMaxLife()">Sort by Max Life</button>
      <button onclick="displayWeaponDevices()">Weapon Devices</button>
      <button onclick="displayUtilityDevices()">Utility Devices</button>
      <button onclick="displayPropulsionDevices()">Propulsion Devices</button>
    </div>
  </body>
</html>
